name: Pica Package Build and Release

on:
  push:
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # needed for tj-actions/changed-files

      - name: Get Changed Files in src/
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: src/**
          dir_names: true
          dir_names_max_depth: 3 # e.g. src/mgr/hello
          
      - name: Checkout pica source
        uses: actions/checkout@v4
        with:
          repository: miaoermua/pica
          path: pica-source

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build and Install pica-pack
        run: |
          echo "Compiling pica-pack from miaoermua/pica..."
          cd pica-source
          cargo build --release --bin pica-pack
          sudo mv target/release/pica-pack /usr/local/bin/pica-pack

      - name: Build Changed Packages
        run: |
          mkdir -p build_output
          for dir in ${{ steps.changed-files.outputs.all_changed_files }}; do
            # Ensure it is a valid package directory (has manifest)
            if [ -f "$dir/manifest" ]; then
              echo "Building package in $dir..."
              pica-pack build "$dir" --outdir build_output
            fi
          done

      - name: Install Python Requirements (if any)
        run: |
          python -m pip install --upgrade pip

      - name: Aggregate r/repo.json
        run: |
          # Ensure r/ exists
          mkdir -p r
          # Run aggregation script over all built packages
          # If no packages matched, this will just exit gracefully
          if ls build_output/*.pkg.tar.gz 1> /dev/null 2>&1; then
            export PYTHONPATH=$PYTHONPATH:$(pwd)
            python3 ci/scripts/gen_repo_index.py build_output/*.pkg.tar.gz
          else
            echo "No packages were built."
          fi

      - name: Generate Release Tag
        id: date
        run: echo "RELEASE_TAG=$(date +'%y-%m-%d-%H-%M-%S')" >> $GITHUB_ENV

      - name: Create Snapshot Release
        uses: softprops/action-gh-release@v2
        if: success() && hashFiles('build_output/*.pkg.tar.gz') != ''
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          files: build_output/*.pkg.tar.gz

      - name: Update Rolling Latest Release
        uses: softprops/action-gh-release@v2
        if: success() && hashFiles('build_output/*.pkg.tar.gz') != ''
        with:
          tag_name: latest
          name: Latest Packages
          files: build_output/*.pkg.tar.gz
          # Draft/Prerelease logic can be added here

      - name: Commit Updated repo.json
        run: |
          if [ -f "r/repo.json" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add r/repo.json
            if git diff --staged --quiet; then
              echo "No changes to r/repo.json to commit."
            else
              git commit -m "chore: auto-update r/repo.json [skip ci]"
              git push origin $GITHUB_REF_NAME
            fi
          else
            echo "r/repo.json does not exist. Skipping commit."
          fi
